<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cerapan Azimut (Lampiran K1)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 20px; padding-bottom: 40px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-header { font-weight: bold; background-color: #0d6efd; color: white; }
        .section-title { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 2px solid #0d6efd; padding-bottom: 5px; }
        .result-box { font-size: 1.5rem; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">Sistem E-Cerapan Azimut</h2>

    <div class="card">
        <div class="card-header">Seksyen 1: Maklumat Am</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6"><label>Stesen</label><input type="text" class="form-control" id="stn"></div>
                <div class="col-md-6">
                    <label>Latitud (φ) [D.MMSS]</label>
                    <input type="number" id="latitud" class="form-control" step="any" placeholder="Contoh: 4.3520">
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Seksyen 2: Data Cerapan (Format: D.MMSS)</div>
        <div class="card-body">
            <h5 class="section-title">Mengufuk (Hz)</h5>
            <div class="row g-3 mb-3">
                <div class="col-6"><label>P. Kiri (Hz1)</label><input type="number" id="hKiri" class="form-control" step="any"></div>
                <div class="col-6"><label>P. Kanan (Hz3)</label><input type="number" id="hKanan" class="form-control" step="any"></div>
            </div>
            <h5 class="section-title">Pugak (V)</h5>
            <div class="row g-3">
                <div class="col-6"><label>P. Kiri (V1)</label><input type="number" id="vKiri" class="form-control" step="any"></div>
                <div class="col-6"><label>P. Kanan (V3)</label><input type="number" id="vKanan" class="form-control" step="any"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Seksyen 3: Data Almanak</div>
        <div class="card-body">
            <label>Sudutistiwa (δ) [D.MMSS]</label>
            <input type="number" id="sudutistiwa" class="form-control" step="any" placeholder="Contoh: 2.1359">
            <button class="btn btn-success w-100 mt-4 py-2" onclick="kiraSemua()">KIRA AZIMUT</button>
        </div>
    </div>

    <div class="card border-primary">
        <div class="card-header bg-primary text-white">Seksyen 4: Keputusan (Calculation)</div>
        <div class="card-body">
            <div class="row text-center">
                <div class="col-md-4">
                    <p>Purata Altitud (H)</p>
                    <div id="outH" class="fw-bold">-</div>
                </div>
                <div class="col-md-4">
                    <p>Altitud Dilaras (α)</p>
                    <div id="outAlpha" class="fw-bold">-</div>
                </div>
                <div class="col-md-4">
                    <p>Azimut Matahari</p>
                    <div id="finalAzimut" class="result-box">00° 00' 00"</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // FUNGSI TUKAR DMS KE DD
    function dmsToDd(val) {
        if (!val) return 0;
        let d = Math.floor(val);
        let m = Math.floor((val - d) * 100);
        let s = (val - d - (m / 100)) * 10000;
        return d + (m / 60) + (s / 3600);
    }

    // FUNGSI TUKAR DD KE DMS STRING
    function ddToDmsStr(dd) {
        let d = Math.floor(dd);
        let m = Math.floor((dd - d) * 60);
        let s = Math.round((dd - d - (m / 60)) * 3600);
        if (s >= 60) { s = 0; m++; }
        if (m >= 60) { m = 0; d++; }
        return d + "° " + m + "' " + s + "\"";
    }

    function kiraSemua() {
        try {
            // AMBIL DATA
            let Hz1 = dmsToDd(parseFloat(document.getElementById('hKiri').value));
            let Hz3 = dmsToDd(parseFloat(document.getElementById('hKanan').value));
            let V1 = dmsToDd(parseFloat(document.getElementById('vKiri').value));
            let V3 = dmsToDd(parseFloat(document.getElementById('vKanan').value));
            let phi = dmsToDd(parseFloat(document.getElementById('latitud').value));
            let delta = dmsToDd(parseFloat(document.getElementById('sudutistiwa').value));

            // B. PURATA UFUK (LOGIK Hz1 < 180 atau > 180)
            let purataHz = (Hz1 < 180) ? (Hz1 + (Hz3 - 180)) / 2 : (Hz1 + (Hz3 + 180)) / 2;

            // D. PURATA ALTITUD (H) - Auto Detect AM/PM
            let jam = new Date().getHours();
            let H_DD = (jam < 12) ? ((90 - V1) + (V3 - 270)) / 2 : (V1 + (V3 - 180)) / 2;

            // E. BIASAN & BEDALIHAT
            let H_rad = H_DD * Math.PI / 180;
            let biasanSaat = (41.4105 + (8.8 * Math.cos(H_rad))) / Math.tan(H_rad);
            let E_DD = biasanSaat / 3600;

            // F. ALTITUD DILARAS
            let alpha = H_DD - E_DD;

            // KIRA AZIMUT (FORMULA KOSAIN)
            let alpha_rad = alpha * Math.PI / 180;
            let phi_rad = phi * Math.PI / 180;
            let delta_rad = delta * Math.PI / 180;

            let atas = Math.sin(delta_rad) - (Math.sin(phi_rad) * Math.sin(alpha_rad));
            let bawah = Math.cos(phi_rad) * Math.cos(alpha_rad);
            let cosA = atas / bawah;
            
            let azimut_DD = Math.acos(cosA) * 180 / Math.PI;

            // PAPAR KEPUTUSAN
            document.getElementById('outH').innerText = ddToDmsStr(H_DD);
            document.getElementById('outAlpha').innerText = ddToDmsStr(alpha);
            document.getElementById('finalAzimut').innerText = ddToDmsStr(azimut_DD);

        } catch (err) {
            alert("Sila pastikan semua kotak diisi dengan nombor!");
        }
    }
</script>

</body>
</html>
